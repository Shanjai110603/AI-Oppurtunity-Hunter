<!DOCTYPE html>
<html>
<head>
  <title>Opportunity Hunter</title>
  <style>
    body { font-family: 'Inter', sans-serif; width: 350px; padding: 16px; margin: 0; background: #0f172a; color: #f8fafc; }
    h2 { font-size: 18px; margin-top: 0; margin-bottom: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
    p { font-size: 13px; color: #94a3b8; margin-bottom: 16px; line-height: 1.4; }
    button { 
      background: linear-gradient(135deg, #3b82f6, #8b5cf6); 
      color: white; 
      border: none; 
      padding: 12px; 
      border-radius: 8px; 
      cursor: pointer; 
      font-weight: 600; 
      width: 100%; 
      margin-bottom: 10px; 
      transition: opacity 0.2s, transform 0.1s; 
      box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
    }
    button:hover { opacity: 0.9; }
    button:active { transform: scale(0.98); }
    .status { margin-top: 12px; font-size: 12px; color: #cbd5e1; text-align: center; }
  </style>
</head>
<body>
  <h2>🔍 AI Opportunity Hunter</h2>
  <p>Scan the current page to detect business problems and automation opportunities.</p>
  <button id="scanBtn">Scan Current Page</button>
  <div class="status" id="statusMsg"></div>
  <script src="popup.js"></script>
</body>
</html>
